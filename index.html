async function sbGetUser(id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/users?id=eq.${id}&limit=1`, { headers: SBH });
    const d = await r.json();
    if (!d?.length) return null;
    const u = d[0];
    return { id:u.id, nickname:u.nickname, character:u.character, pin:u.pin||"", xp:u.xp||0, todos:u.todos||{}, todoHistory:u.todo_history||[], history:u.history||[], checkins:u.checkins||[], pokes:u.pokes||[], promoCleared:u.promo_cleared||{} };
  } catch { return null; }
}
async function sbGetAllUsers() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/users?order=updated_at.desc`, { headers: SBH });
    const d = await r.json();
    if (!Array.isArray(d)) return [];
    return d.map(u => ({ id:u.id, nickname:u.nickname, character:u.character, pin:u.pin||"", xp:u.xp||0, todos:u.todos||{}, todoHistory:u.todo_history||[], history:u.history||[], checkins:u.checkins||[], pokes:u.pokes||[], promoCleared:u.promo_cleared||{} }));
  } catch { return []; }
}
async function sbSaveUser(user) {
  try {
    await fetch(`${SB_URL}/rest/v1/users`, {
      method:"POST",
      headers:{ ...SBH, "Prefer":"resolution=merge-duplicates,return=minimal" },
      body:JSON.stringify({ id:user.id, nickname:user.nickname, character:user.character, pin:user.pin||"", xp:user.xp||0, todos:user.todos||{}, todo_history:user.todoHistory||[], history:user.history||[], checkins:user.checkins||[], pokes:user.pokes||[], promo_cleared:user.promoCleared||{}, updated_at:new Date().toISOString() })

  } catch {}
}

function calcScore(domain, answers) {
  if (!answers) return null;
  const vals = domain.questions.map(q => answers[q.id]).filter(v => v !== undefined && v !== null);
  if (!vals.length) return null;
  return Math.round((vals.reduce((a,b)=>a+b,0) / (vals.length*4)) * 100);
}
function getLevel(score) {
  if (score===null||score===undefined) return {label:"미응답",color:"#aaa"};
  if (score>=80) return {label:"강점",color:"#6BA89A"};
  if (score>=60) return {label:"양호",color:"#8FAF7E"};
  if (score>=40) return {label:"보통",color:"#D4A853"};
  return {label:"집중필요",color:"#C0706A"};
}
function fmtDate(iso) { if(!iso)return""; const d=new Date(iso); return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`; }
function getUid() { try { return localStorage.getItem("ccc_uid"); } catch { return null; } }
function setUid(id) { try { localStorage.setItem("ccc_uid", id); } catch {} }

// 날짜 키 헬퍼
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
function getDateKey(type) { return type === "daily" ? getTodayKey() : getWeekKey(); }

// RADAR CHART
// ═══════════════════════════════════════════
function RadarChart({ scores, size=260 }) {
  const n=scores.length, cx=size/2, cy=size/2, r=size/2-38;
  const pts = scores.map((s,i) => {
    const a=(i/n)*2*Math.PI-Math.PI/2, v=Math.max(0,Math.min(1,(s.score||0)/100));
    return { x:cx+r*v*Math.cos(a), y:cy+r*v*Math.sin(a), lx:cx+(r+26)*Math.cos(a), ly:cy+(r+26)*Math.sin(a) };
  });
  const poly = pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:"100%",maxWidth:size}}>
      {[.25,.5,.75,1].map(lv=>scores.map((_,i)=>{
        const a1=(i/n)*2*Math.PI-Math.PI/2, a2=((i+1)/n)*2*Math.PI-Math.PI/2;
        return <line key={`g${lv}${i}`} x1={(cx+r*lv*Math.cos(a1)).toFixed(1)} y1={(cy+r*lv*Math.sin(a1)).toFixed(1)} x2={(cx+r*lv*Math.cos(a2)).toFixed(1)} y2={(cy+r*lv*Math.sin(a2)).toFixed(1)} stroke="#e0d8ce" strokeWidth={.8}/>;
      }))}
      {scores.map((_,i)=>{ const a=(i/n)*2*Math.PI-Math.PI/2; return <line key={`sp${i}`} x1={cx} y1={cy} x2={(cx+r*Math.cos(a)).toFixed(1)} y2={(cy+r*Math.sin(a)).toFixed(1)} stroke="#d0c8be" strokeWidth={.8}/>; })}
      <polygon points={poly} fill="rgba(139,115,85,.15)" stroke="#8B7355" strokeWidth={2} strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={`d${i}`} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r={3.5} fill={scores[i].color}/>)}
      {pts.map((p,i)=><text key={`l${i}`} x={p.lx.toFixed(1)} y={p.ly.toFixed(1)} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill="#5a4a38">{scores[i].emoji}</text>)}
    </svg>
  );
}

// CHAR BADGE
// ═══════════════════════════════════════════
function CharBadge({ user, compact }) {
  const char = CHARACTERS.find(c=>c.id===user.character)||CHARACTERS[0];
  const lv = xpToLevel(user.xp||0);
  const stage = levelToStage(lv);
  const xpInLv = (user.xp||0)%20;
  const pendingPromo = isPromoLevel(lv) && !(user.promoCleared||{})[lv];
  const stageName = char.stageNames[stage] || "";
  if (compact) return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <CharSVG charId={user.character} stage={stage} size={42}/>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:char.color}}>{user.nickname}</div>
        <div style={{fontSize:10,color:"#8a7260"}}>Lv.{lv} {stageName}</div>
      </div>
    </div>
  );
  return (
    <div style={{background:"white",borderRadius:20,padding:"20px",boxShadow:"0 2px 16px rgba(139,115,85,.12)",textAlign:"center",position:"relative",marginBottom:12}}>
      {pendingPromo && <div style={{position:"absolute",top:10,right:10,background:"#E07A5F",color:"white",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700}}>🎯 전직미션!</div>}
      <div style={{marginBottom:8,display:"flex",justifyContent:"center"}}>
        <CharSVG charId={user.character} stage={stage} size={80}/>
      </div>
      <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:16,fontWeight:700,color:char.color}}>{user.nickname}</div>
      <div style={{fontSize:12,color:"#8a7260",marginBottom:4}}>Lv.{lv} · {stageName}</div>
      <div style={{fontSize:11,color:char.color,marginBottom:8}}>{char.name}</div>
      <div style={{height:6,background:"#f0e8de",borderRadius:3,marginBottom:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${(xpInLv/20)*100}%`,background:char.color,borderRadius:3,transition:"width .4s"}}/>
      </div>
      <div style={{fontSize:10,color:"#aaa"}}>{xpInLv} / 20 XP → Lv.{Math.min(100,lv+1)}</div>
      {pendingPromo && (
        <div style={{marginTop:12,background:"#fff8f0",borderRadius:12,padding:"10px 12px",border:"1px solid #f0d8b8",textAlign:"left"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#b87040",marginBottom:4}}>🎯 전직 미션 Lv.{lv}</div>
          <div style={{fontSize:11,color:"#7a5030",lineHeight:1.5}}>{PROMO_MISSIONS[lv]}</div>
        </div>
      )}
    </div>
  );
}

// 로그인 화면 (닉네임 + PIN)
// ═══════════════════════════════════════════
function LoginScreen({ allUsers, onLogin, onRegister }) {
  const [mode, setMode] = useState(allUsers.length > 0 ? "login" : "register");
  // 로그인
  const [loginNick, setLoginNick] = useState("");
  const [pin, setPin] = useState("");
  const [pinError, setPinError] = useState("");
  // 회원가입
  const [nickname, setNickname] = useState("");
  const [newPin, setNewPin] = useState("");
  const [newPin2, setNewPin2] = useState("");
  const [character, setCharacter] = useState("sprout");
  const [loading, setLoading] = useState(false);
  const [regError, setRegError] = useState("");

  const S = {
    card: { background:"white", borderRadius:20, padding:"24px", boxShadow:"0 2px 20px rgba(139,115,85,.12)" },
    input: { width:"100%", border:"1.5px solid #e0d5c8", borderRadius:10, padding:"11px 14px", fontSize:14, outline:"none", marginTop:6, boxSizing:"border-box" },
    btn: (bg="#8B7355") => ({ background:bg, color:"white", border:"none", borderRadius:10, padding:"13px", fontSize:14, fontWeight:700, cursor:"pointer", width:"100%" }),
    outBtn: { background:"white", border:"1.5px solid #d0c8be", borderRadius:10, padding:"11px", fontSize:13, color:"#5a4a38", cursor:"pointer", width:"100%" },
  };

  const handleLogin = async () => {
    if (!loginNick.trim() || pin.length !== 4) return;
    setLoading(true);
    setPinError("");
    // 닉네임으로 유저 찾기
    const found = allUsers.find(u => u.nickname.trim() === loginNick.trim());
    if (!found) { setPinError("닉네임을 찾을 수 없어요."); setLoading(false); return; }
    const user = await sbGetUser(found.id);
    if (!user) { setPinError("사용자를 찾을 수 없어요."); setLoading(false); return; }
    if (user.pin !== pin) { setPinError("PIN이 틀렸어요."); setLoading(false); return; }
    setUid(user.id);
    onLogin(user);
    setLoading(false);
  };

  const handleRegister = async () => {
    if (!nickname.trim()) { setRegError("닉네임을 입력해주세요."); return; }
    if (newPin.length !== 4) { setRegError("PIN 4자리를 입력해주세요."); return; }
    if (newPin !== newPin2) { setRegError("PIN이 일치하지 않아요."); return; }
    setLoading(true);
    setRegError("");
    // 닉네임 중복 체크
    const isDuplicate = allUsers.some(u => u.nickname.trim() === nickname.trim());
    if (isDuplicate) { setRegError("이미 사용 중인 닉네임이에요!"); setLoading(false); return; }
    const id = `u${Date.now()}`;
    const user = { id, nickname:nickname.trim(), character, pin:newPin, xp:0, todos:{}, todoHistory:[], history:[], checkins:[], pokes:[], promoCleared:{} };
    await sbSaveUser(user);
    setUid(id);
    onRegister(user);
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f5ede0,#ede4d8)",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px 20px"}}>
      <div style={{maxWidth:400,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:8}}>✝️</div>
          <h1 style={{fontFamily:"'Noto Serif KR',serif",fontSize:22,fontWeight:700,marginBottom:4}}>CCC 간사 자기관리</h1>
          <p style={{fontSize:13,color:"#8a7260"}}>팀과 함께 성장하는 사역 관리 앱</p>
        </div>

        {/* 탭 */}
        <div style={{display:"flex",background:"#e8ddd0",borderRadius:12,padding:4,marginBottom:16}}>
          <button onClick={()=>{setMode("login");setPin("");setPinError("");}} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:mode==="login"?"#8B7355":"transparent",color:mode==="login"?"white":"#8a7260",fontSize:13,fontWeight:mode==="login"?700:400,cursor:"pointer"}}>로그인</button>
          <button onClick={()=>{setMode("register");setRegError("");}} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:mode==="register"?"#8B7355":"transparent",color:mode==="register"?"white":"#8a7260",fontSize:13,fontWeight:mode==="register"?700:400,cursor:"pointer"}}>새 계정</button>
        </div>

        {/* 로그인 */}
        {mode==="login" && (
          <div style={S.card}>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,color:"#5a4a38"}}>닉네임</label>
              <input value={loginNick} onChange={e=>setLoginNick(e.target.value)} placeholder="닉네임 입력" style={S.input} maxLength={12} autoFocus/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:700,color:"#5a4a38"}}>PIN 4자리</label>
              <input type="password" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/[^0-9]/g,""))} placeholder="●●●●" style={{...S.input,textAlign:"center",fontSize:20,letterSpacing:8}} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
            </div>
            {pinError && <p style={{fontSize:12,color:"#c05050",marginBottom:10}}>{pinError}</p>}
            <button onClick={handleLogin} disabled={!loginNick.trim()||pin.length!==4||loading} style={{...S.btn(),opacity:loginNick.trim()&&pin.length===4?1:.5}}>
              {loading?"로그인 중..":"로그인"}
            </button>
          </div>
        )}
                {/* 회원가입 */}
        {mode==="register" && (
          <div style={S.card}>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,color:"#5a4a38"}}>닉네임</label>
              <input value={nickname} onChange={e=>setNickname(e.target.value)} placeholder="예: 박간사, 믿음이" style={S.input} maxLength={12}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,color:"#5a4a38"}}>PIN 4자리 설정</label>
              <input type="password" maxLength={4} value={newPin} onChange={e=>setNewPin(e.target.value.replace(/[^0-9]/g,""))} placeholder="숫자 4자리" style={{...S.input,textAlign:"center",fontSize:20,letterSpacing:8}}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:12,fontWeight:700,color:"#5a4a38"}}>PIN 확인</label>
              <input type="password" maxLength={4} value={newPin2} onChange={e=>setNewPin2(e.target.value.replace(/[^0-9]/g,""))} placeholder="숫자 4자리" style={{...S.input,textAlign:"center",fontSize:20,letterSpacing:8}}/>
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,fontWeight:700,color:"#5a4a38",display:"block",marginBottom:8}}>캐릭터 선택</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {CHARACTERS.map(c=>(
                  <div key={c.id} onClick={()=>setCharacter(c.id)} style={{border:`2px solid ${character===c.id?c.color:"#e0d5c8"}`,borderRadius:12,padding:"10px 6px",textAlign:"center",cursor:"pointer",background:character===c.id?`${c.color}18`:"white"}}>
                    <div style={{display:"flex",justifyContent:"center"}}><CharSVG charId={c.id} stage={0} size={44}/></div>
                    <div style={{fontSize:11,fontWeight:600,color:c.color,marginTop:4}}>{c.name}</div>
                  </div>
                ))}
              </div>
            </div>
            {regError && <p style={{fontSize:12,color:"#c05050",marginBottom:10}}>{regError}</p>}
            <button onClick={handleRegister} disabled={!nickname.trim()||newPin.length!==4||loading} style={{...S.btn(),opacity:nickname.trim()&&newPin.length===4?1:.5}}>
              {loading?"저장 중...":"시작하기 🌱"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App() {
  const [myId, setMyId] = useState(null);
  const [myData, setMyData] = useState(null);
  const [allUsers, setAllUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("home");
  const [quiz, setQuiz] = useState({ active:false, answers:{}, domainIdx:0 });
  const [todoSel, setTodoSel] = useState({ domain:"devotion", type:"daily" });
  const [checkin, setCheckin] = useState({ type:"daily", answers:{}, note:"" });
  const [teamMember, setTeamMember] = useState(null);
  const [promoModal, setPromoModal] = useState(null);

  const loadAll = useCallback(async () => {
    const users = await sbGetAllUsers();
    setAllUsers(users);
  }, []);

  useEffect(() => {
    (async () => {
      await loadAll();
      const savedId = getUid();
      if (savedId) {
        const d = await sbGetUser(savedId);
        if (d) { setMyId(savedId); setMyData(d); }
      }
      setLoading(false);
    })();
  }, []);

  useEffect(() => { const iv = setInterval(loadAll, 15000); return () => clearInterval(iv); }, [loadAll]);



  const handleLogout = useCallback(() => {
    setMyId(null);
    setMyData(null);
    setUid("");
    setTab("home");
  }, []);

  const saveMe = useCallback(async (data) => {
    setMyData(data);
    await sbSaveUser(data);
    setAllUsers(prev => [...prev.filter(u=>u.id!==data.id), data]);
  }, []);

  const addXP = useCallback(async (data, amount) => {
    const oldLv = xpToLevel(data.xp||0);
    const newXp = (data.xp||0) + amount;
    const newLv = xpToLevel(newXp);
    const updated = { ...data, xp: newXp };
    setMyData(updated);
    await sbSaveUser(updated);
    setAllUsers(prev => [...prev.filter(u=>u.id!==updated.id), updated]);
    if (newLv !== oldLv && isPromoLevel(newLv)) setPromoModal(newLv);
    return updated;
  }, []);

  const finishQuiz = async () => {
    const entry = { id:Date.now(), date:new Date().toISOString(), answers:{...quiz.answers} };
    const updated = { ...myData, history:[...(myData.history||[]), entry] };
    await saveMe(updated);
    setQuiz({ active:false, answers:{}, domainIdx:0 });
    setTab("result");
  };

  const toggleTodo = useCallback(async (domainId, type, idx) => {
    if (!myData) return;
    const dateKey = getDateKey(type);
    const key = `${domainId}_${type}_${idx}_${dateKey}`;
    const wasDone = !!(myData.todos||{})[key];
    const newTodos = { ...(myData.todos||{}), [key]: !wasDone };

    // todoHistory에 기록 추가/제거
    const domain = DOMAINS.find(d => d.id === domainId);
    const itemText = domain?.todos[type]?.[idx] || "";
    let newHistory = [...(myData.todoHistory||[])];
    if (!wasDone) {
      // 완료 기록 추가
      newHistory.push({ id:Date.now(), date:new Date().toISOString(), dateKey, type, domainId, idx, itemText });
    } else {
      // 완료 취소 시 해당 기록 제거
      newHistory = newHistory.filter(h => !(h.dateKey===dateKey && h.domainId===domainId && h.type===type && h.idx===idx));
    }
    // 최근 500개만 유지
    if (newHistory.length > 500) newHistory = newHistory.slice(-500);

    const updated = { ...myData, todos: newTodos, todoHistory: newHistory };
    if (!wasDone) {
      await addXP(updated, 1);
    } else {
      await saveMe(updated);
    }
  }, [myData, saveMe, addXP]);

  const todoChecked = (domainId, type, idx) => {
    const dateKey = getDateKey(type);
    return !!(myData?.todos||{})[`${domainId}_${type}_${idx}_${dateKey}`];
  };

  const submitCheckin = async () => {
    if (!myData) return;
    const entry = { id:Date.now(), date:new Date().toISOString(), type:checkin.type, answers:{...checkin.answers}, note:checkin.note };
    const withCheckin = { ...myData, checkins:[...(myData.checkins||[]), entry] };
    await addXP(withCheckin, 2);
    setCheckin({ type:"daily", answers:{}, note:"" });
    alert("점검 완료! +2 XP ✅");
  };

  const pokeMember = async (targetId) => {
    const target = allUsers.find(u=>u.id===targetId);
    if (!target) return;
    const msg = POKE_MSGS[Math.floor(Math.random()*POKE_MSGS.length)];
    const poke = { id:Date.now(), from:myData.nickname, msg, date:new Date().toISOString() };
    const updated = { ...target, pokes:[...(target.pokes||[]).slice(-19), poke] };
    await sbSaveUser(updated);
    setAllUsers(prev => [...prev.filter(u=>u.id!==targetId), updated]);
    alert(`${target.nickname}에게 콕 찌르기를 보냈어요! 🫵`);
  };

  const clearPromo = async (lv) => {
    if (!myData) return;
    const updated = { ...myData, promoCleared:{...(myData.promoCleared||{}), [lv]:true} };
    await saveMe(updated);
    setPromoModal(null);
  };

  const teammates = allUsers.filter(u => u.id !== myId);
  const latestResult = myData?.history?.slice(-1)[0] || null;
  const resultScores = latestResult ? DOMAINS.map(d => ({ ...d, score: calcScore(d, latestResult.answers) })) : null;
  const quizD = DOMAINS[quiz.domainIdx];
  const quizDone = quizD?.questions.every(q => quiz.answers[q.id] !== undefined);
  const totalQ = DOMAINS.reduce((s,d)=>s+d.questions.length, 0);
  const answeredQ = Object.keys(quiz.answers).length;

  const S = {
    page: { maxWidth:520, margin:"0 auto", padding:"24px 18px" },
    card: { background:"white", borderRadius:16, padding:"16px 18px", boxShadow:"0 1px 12px rgba(139,115,85,.09)", marginBottom:12 },
    btn: (bg="#8B7355") => ({ background:bg, color:"white", border:"none", borderRadius:10, padding:"11px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }),
    outBtn: { background:"white", border:"1.5px solid #d0c8be", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#5a4a38", cursor:"pointer" },
    tabBtn: (on) => ({ flex:1, padding:"10px 4px", borderRadius:10, border:"none", background:on?"#8B7355":"transparent", color:on?"white":"#8a7260", fontSize:11, fontWeight:on?700:400, cursor:"pointer" }),
  };
  const NAV = [{id:"home",e:"🏠",l:"홈"},{id:"todos",e:"✅",l:"투두"},{id:"checkin",e:"📋",l:"점검"},{id:"team",e:"👥",l:"팀"},{id:"history",e:"📈",l:"기록"}];

  // ── LOADING
  if (loading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f5ede0,#ede4d8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>✝️</div>
        <div style={{fontSize:14,color:"#8a7260"}}>서버 연결 중...</div>
      </div>
    </div>
  );

  // ── 카카오 로그인 화면
  if (!myId) return (
    <LoginScreen
      allUsers={allUsers}
      onLogin={(user) => { setMyId(user.id); setMyData(user); setAllUsers(prev => [...prev.filter(u=>u.id!==user.id), user]); setTab("home"); }}
      onRegister={(user) => { setMyId(user.id); setMyData(user); setAllUsers(prev => [...prev, user]); setTab("home"); }}
    />
  );

  // ── QUIZ
  if (quiz.active) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f5ede0,#ede4d8)",paddingBottom:40}}>
      <div style={S.page}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <button onClick={()=>setQuiz(p=>({...p,active:false}))} style={{...S.outBtn,padding:"7px 14px"}}>← 나가기</button>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#8a7260",marginBottom:4}}><span>{answeredQ}/{totalQ}</span><span>{Math.round(answeredQ/totalQ*100)}%</span></div>
            <div style={{height:5,background:"#e0d5c8",borderRadius:3}}><div style={{height:"100%",width:`${answeredQ/totalQ*100}%`,background:"#8B7355",borderRadius:3,transition:"width .3s"}}/></div>
          </div>
        </div>
        <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
          {DOMAINS.map((d,i)=>{ const done=d.questions.every(q=>quiz.answers[q.id]!==undefined); return <button key={d.id} onClick={()=>setQuiz(p=>({...p,domainIdx:i}))} style={{flexShrink:0,background:i===quiz.domainIdx?d.color:done?`${d.color}25`:"white",color:i===quiz.domainIdx?"white":"#5a4a38",border:`1.5px solid ${i===quiz.domainIdx?d.color:"#ddd"}`,borderRadius:18,padding:"4px 11px",fontSize:11,cursor:"pointer",fontWeight:i===quiz.domainIdx?700:400}}>{d.emoji}{done&&i!==quiz.domainIdx?" ✓":""}</button>; })}
        </div>
        <div style={{...S.card,borderTop:`4px solid ${quizD.color}`,marginBottom:14}}>
          <div style={{marginBottom:14}}><span style={{fontSize:22}}>{quizD.emoji}</span><h2 style={{fontFamily:"'Noto Serif KR',serif",fontSize:16,fontWeight:700,margin:"4px 0 2px"}}>{quizD.name}</h2><span style={{fontSize:11,color:quizD.color,fontWeight:600}}>{quizD.sub}</span></div>
          {quizD.questions.map((q,qi)=>(
            <div key={q.id} style={{marginBottom:18}}>
              <p style={{fontSize:13,lineHeight:1.7,marginBottom:8}}><span style={{fontWeight:700,color:quizD.color}}>Q{qi+1}. </span>{q.text}</p>
              <div style={{display:"flex",gap:5}}>
                {[0,1,2,3,4].map(val=>(
                  <button key={val} onClick={()=>setQuiz(p=>({...p,answers:{...p.answers,[q.id]:val}}))} style={{flex:1,height:36,borderRadius:7,border:quiz.answers[q.id]===val?`2px solid ${quizD.color}`:"1.5px solid #e0d5c8",background:quiz.answers[q.id]===val?`${quizD.color}25`:"white",cursor:"pointer",fontSize:12,fontWeight:quiz.answers[q.id]===val?700:400,color:quiz.answers[q.id]===val?quizD.color:"#bbb"}}>{val+1}</button>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:10,color:"#bbb"}}><span>전혀 아니다</span><span>매우 그렇다</span></div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          {quiz.domainIdx>0&&<button onClick={()=>setQuiz(p=>({...p,domainIdx:p.domainIdx-1}))} style={{...S.outBtn,flex:1}}>← 이전</button>}
          <button onClick={()=>{ if(quiz.domainIdx<DOMAINS.length-1) setQuiz(p=>({...p,domainIdx:p.domainIdx+1})); else finishQuiz(); }} disabled={!quizDone} style={{...S.btn(quizDone?"#8B7355":"#ccc"),flex:2,opacity:quizDone?1:.5,cursor:quizDone?"pointer":"not-allowed"}}>
            {quiz.domainIdx<DOMAINS.length-1?"다음 →":"결과 보기 🎯"}
          </button>
        </div>
      </div>
    </div>
  );

  // ── MAIN
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f5ede0,#ede4d8)",paddingBottom:80}}>
      {promoModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

              </div>
            )}
            {[...(myData?.history||[])].reverse().map((h,i)=>{ const scores=DOMAINS.map(d=>({...d,score:calcScore(d,h.answers)})); const valid=scores.filter(d=>d.score!==null); const avg=valid.length?Math.round(valid.reduce((s,d)=>s+d.score,0)/valid.length):0; return <div key={h.id} style={S.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>📅 {fmtDate(h.date)}{i===0?<span style={{fontSize:10,color:"#8B7355",marginLeft:4}}>최근</span>:""}</span><span style={{fontSize:13,fontWeight:700,color:"#8B7355"}}>평균 {avg}점</span></div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{scores.map(d=>{const lv=getLevel(d.score);return <span key={d.id} style={{background:`${lv.color}18`,borderRadius:6,padding:"3px 7px",fontSize:10,color:lv.color,fontWeight:600}}>{d.emoji}{d.score!==null?d.score:"?"}</span>;})}</div></div>; })}
          </>}

          {/* 투두 히스토리 */}
          {historyTab==="todos" && <>
            {todoDateGroups.length === 0 && (
              <div style={{...S.card,textAlign:"center",padding:"50px 20px",color:"#8a7260"}}>
                <div style={{fontSize:36,marginBottom:10}}>✅</div>
                <p>아직 완료한 투두가 없어요</p>
                <p style={{fontSize:12,marginTop:6}}>투두를 체크하면 여기에 기록돼요!</p>
              </div>
            )}
            {todoDateGroups.map(group => {
              const isWeekly = group.type === "weekly";
              const domainCounts = {};
              group.items.forEach(h => {
                if (!domainCounts[h.domainId]) domainCounts[h.domainId] = 0;
                domainCounts[h.domainId]++;
              });
              return (
                <div key={group.dateKey} style={S.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div>
                      <span style={{fontSize:13,fontWeight:700}}>{isWeekly ? "📆" : "📅"} {group.dateKey}</span>
                      <span style={{fontSize:10,color:"#aaa",marginLeft:6}}>{isWeekly ? "주간" : "일간"}</span>
                    </div>
                    <span style={{fontSize:12,color:"#8B7355",fontWeight:700}}>✅ {group.items.length}개 완료</span>
                  </div>
                  {/* 도메인별 요약 */}
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
                    {Object.entries(domainCounts).map(([dId, cnt]) => {
                      const dom = DOMAINS.find(x=>x.id===dId);
                      if (!dom) return null;
                      return <span key={dId} style={{background:`${dom.color}18`,borderRadius:6,padding:"3px 8px",fontSize:10,color:dom.color,fontWeight:600}}>{dom.emoji} {cnt}개</span>;
                    })}
                  </div>
                  {/* 개별 항목 */}
                  <div style={{borderTop:"1px solid #f0e8de",paddingTop:8}}>
                    {group.items.map((h,i) => {
                      const dom = DOMAINS.find(x=>x.id===h.domainId);
                      return (
                        <div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<group.items.length-1?"1px solid #f8f4ef":"none"}}>
                          <span style={{fontSize:12,flexShrink:0}}>{dom?.emoji}</span>
                          <span style={{fontSize:11,color:"#5a4a38",flex:1,lineHeight:1.5}}>{h.itemText}</span>
                          <span style={{fontSize:10,color:"#aaa",flexShrink:0}}>{new Date(h.date).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {todoDateGroups.length > 0 && (
              <div style={{textAlign:"center",fontSize:11,color:"#bbb",marginTop:8}}>최근 30일 기록 표시</div>
            )}
          </>}
        </div>
        );
      })()}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(245,237,224,.96)",backdropFilter:"blur(8px)",borderTop:"1px solid #e0d5c8",display:"flex",padding:"8px 16px 12px"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>{setTeamMember(null);setTab(n.id);}} style={{flex:1,padding:"8px 0",borderRadius:10,border:"none",background:tab===n.id?"#8B7355":"transparent",color:tab===n.id?"white":"#8a7260",fontSize:11,fontWeight:tab===n.id?700:400,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{n.e}</span><span style={{fontSize:10}}>{n.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
