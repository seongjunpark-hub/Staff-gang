const SBH = { "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":`Bearer ${SB_KEY}`, "Prefer":"return=representation" };

async function sbGetUser(id) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/users?id=eq.${id}&limit=1`, { headers: SBH });
    const d = await r.json();
    if (!d?.length) return null;
    const u = d[0];
    return { id:u.id, nickname:u.nickname, character:u.character, xp:u.xp||0, todos:u.todos||{}, history:u.history||[], checkins:u.checkins||[], pokes:u.pokes||[], promoCleared:u.promo_cleared||{} };
  } catch { return null; }
}
async function sbGetAllUsers() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/users?order=updated_at.desc`, { headers: SBH });
    const d = await r.json();
    if (!Array.isArray(d)) return [];
    return d.map(u => ({ id:u.id, nickname:u.nickname, character:u.character, xp:u.xp||0, todos:u.todos||{}, history:u.history||[], checkins:u.checkins||[], pokes:u.pokes||[], promoCleared:u.promo_cleared||{} }));
  } catch { return []; }
}
async function sbSaveUser(user) {
  try {
    await fetch(`${SB_URL}/rest/v1/users`, {
      method:"POST",
      headers:{ ...SBH, "Prefer":"resolution=merge-duplicates,return=minimal" },
      body:JSON.stringify({ id:user.id, nickname:user.nickname, character:user.character, xp:user.xp||0, todos:user.todos||{}, history:user.history||[], checkins:user.checkins||[], pokes:user.pokes||[], promo_cleared:user.promoCleared||{}, updated_at:new Date().toISOString() })
    });
  } catch {}
}

// HELPERS
// ═══════════════════════════════════════════
function calcScore(domain, answers) {
  if (!answers) return null;
  const vals = domain.questions.map(q => answers[q.id]).filter(v => v !== undefined && v !== null);
  if (!vals.length) return null;
  return Math.round((vals.reduce((a,b)=>a+b,0) / (vals.length*4)) * 100);
}
function getLevel(score) {
  if (score===null||score===undefined) return {label:"미응답",color:"#aaa"};
  if (score>=80) return {label:"강점",color:"#6BA89A"};
  if (score>=60) return {label:"양호",color:"#8FAF7E"};
  if (score>=40) return {label:"보통",color:"#D4A853"};
  return {label:"집중필요",color:"#C0706A"};
}
function fmtDate(iso) { if(!iso)return""; const d=new Date(iso); return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`; }
function getUid() { try { return localStorage.getItem("ccc_uid"); } catch { return null; } }
function setUid(id) { try { localStorage.setItem("ccc_uid", id); } catch {} }

// ═══════════════════════════════════════════
// RADAR CHART
// ═══════════════════════════════════════════
function RadarChart({ scores, size=260 }) {
  const n=scores.length, cx=size/2, cy=size/2, r=size/2-38;
  const pts = scores.map((s,i) => {
    const a=(i/n)*2*Math.PI-Math.PI/2, v=Math.max(0,Math.min(1,(s.score||0)/100));
    return { x:cx+r*v*Math.cos(a), y:cy+r*v*Math.sin(a), lx:cx+(r+26)*Math.cos(a), ly:cy+(r+26)*Math.sin(a) };
  });
  const poly = pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:"100%",maxWidth:size}}>
      {[.25,.5,.75,1].map(lv=>scores.map((_,i)=>{
        const a1=(i/n)*2*Math.PI-Math.PI/2, a2=((i+1)/n)*2*Math.PI-Math.PI/2;
        return <line key={`g${lv}${i}`} x1={(cx+r*lv*Math.cos(a1)).toFixed(1)} y1={(cy+r*lv*Math.sin(a1)).toFixed(1)} x2={(cx+r*lv*Math.cos(a2)).toFixed(1)} y2={(cy+r*lv*Math.sin(a2)).toFixed(1)} stroke="#e0d8ce" strokeWidth={.8}/>;
      }))}
      {scores.map((_,i)=>{ const a=(i/n)*2*Math.PI-Math.PI/2; return <line key={`sp${i}`} x1={cx} y1={cy} x2={(cx+r*Math.cos(a)).toFixed(1)} y2={(cy+r*Math.sin(a)).toFixed(1)} stroke="#d0c8be" strokeWidth={.8}/>; })}
      <polygon points={poly} fill="rgba(139,115,85,.15)" stroke="#8B7355" strokeWidth={2} strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={`d${i}`} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r={3.5} fill={scores[i].color}/>)}
      {pts.map((p,i)=><text key={`l${i}`} x={p.lx.toFixed(1)} y={p.ly.toFixed(1)} textAnchor="middle" dominantBaseline="middle" fontSize="10" fill="#5a4a38">{scores[i].emoji}</text>)}
    </svg>
  );
}

// ═══════════════════════════════════════════
// CHAR BADGE
// ═══════════════════════════════════════════
function CharBadge({ user, compact }) {
  const char = CHARACTERS.find(c=>c.id===user.character)||CHARACTERS[0];
  const lv = xpToLevel(user.xp||0);
  const stage = levelToStage(lv);
  const xpInLv = (user.xp||0)%20;
  const pendingPromo = isPromoLevel(lv) && !(user.promoCleared||{})[lv];
  if (compact) return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:26}}>{char.stages[stage]}</span>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:char.color}}>{user.nickname}</div>
        <div style={{fontSize:10,color:"#8a7260"}}>Lv.{lv} {char.name} · {user.xp||0} XP</div>
      </div>
    </div>
  );
  return (
    <div style={{background:"white",borderRadius:20,padding:"20px",boxShadow:"0 2px 16px rgba(139,115,85,.12)",textAlign:"center",position:"relative",marginBottom:12}}>
      {pendingPromo && <div style={{position:"absolute",top:10,right:10,background:"#E07A5F",color:"white",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700}}>🎯 전직미션!</div>}
      <div style={{fontSize:54,marginBottom:6,lineHeight:1}}>{char.stages[stage]}</div>
      <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:16,fontWeight:700,color:char.color}}>{user.nickname}</div>
      <div style={{fontSize:12,color:"#8a7260",marginBottom:10}}>Lv.{lv} {char.name}</div>
      <div style={{height:6,background:"#f0e8de",borderRadius:3,marginBottom:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${(xpInLv/20)*100}%`,background:char.color,borderRadius:3,transition:"width .4s"}}/>
      </div>
      <div style={{fontSize:10,color:"#aaa"}}>{xpInLv} / 20 XP → Lv.{Math.min(100,lv+1)}</div>
      {pendingPromo && (
        <div style={{marginTop:12,background:"#fff8f0",borderRadius:12,padding:"10px 12px",border:"1px solid #f0d8b8",textAlign:"left"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#b87040",marginBottom:4}}>🎯 전직 미션 Lv.{lv}</div>
          <div style={{fontSize:11,color:"#7a5030",lineHeight:1.5}}>{PROMO_MISSIONS[lv]}</div>
        </div>
      )}
    </div>
  );
}

            </div>
          )}
          {[...(myData?.history||[])].reverse().map((h,i)=>{ const scores=DOMAINS.map(d=>({...d,score:calcScore(d,h.answers)})); const valid=scores.filter(d=>d.score!==null); const avg=valid.length?Math.round(valid.reduce((s,d)=>s+d.score,0)/valid.length):0; return <div key={h.id} style={S.card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>📅 {fmtDate(h.date)}{i===0?<span style={{fontSize:10,color:"#8B7355",marginLeft:4}}>최근</span>:""}</span><span style={{fontSize:13,fontWeight:700,color:"#8B7355"}}>평균 {avg}점</span></div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{scores.map(d=>{const lv=getLevel(d.score);return <span key={d.id} style={{background:`${lv.color}18`,borderRadius:6,padding:"3px 7px",fontSize:10,color:lv.color,fontWeight:600}}>{d.emoji}{d.score!==null?d.score:"?"}</span>;})}</div></div>; })}
        </div>
      )}

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(245,237,224,.96)",backdropFilter:"blur(8px)",borderTop:"1px solid #e0d5c8",display:"flex",padding:"8px 16px 12px"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>{setTeamMember(null);setTab(n.id);}} style={{flex:1,padding:"8px 0",borderRadius:10,border:"none",background:tab===n.id?"#8B7355":"transparent",color:tab===n.id?"white":"#8a7260",fontSize:11,fontWeight:tab===n.id?700:400,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18}}>{n.e}</span><span style={{fontSize:10}}>{n.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
